spring:
  datasource:
    url: jdbc:h2:mem:eventosbd;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

app:
  mail:
    mock-mode: ${MAIL_MOCK_MODE:true}
