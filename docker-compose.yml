services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-eventosbd}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - eventos_net

  mailhog:
    image: mailhog/mailhog:v1.0.1
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8025/api/v2/messages"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "${MAILHOG_UI_PORT:-8025}:8025"
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
    networks:
      - eventos_net

  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    depends_on:
      mysql:
        condition: service_healthy
      mailhog:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/eventosbd?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&useTimezone=false}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-root}
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_FROM: ${MAIL_FROM:-noreply@gestion-eventos.local}
      MAIL_MOCK_MODE: ${MAIL_MOCK_MODE:-false}
      MAIL_FAIL_ON_ERROR: ${MAIL_FAIL_ON_ERROR:-true}
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-false}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-aaee89681dd2ffeec808837802a9fdb19b157c71aea36e1886e42c7b2fe0fd7c}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-900000}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-604800000}
      JAVA_OPTS: "${BACKEND_JAVA_OPTS:-}"
    ports:
      - "${BACKEND_PORT:-9090}:9090"
    networks:
      - eventos_net

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend-dev:
        condition: service_started
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:9090}
      CHOKIDAR_USEPOLLING: "true"
      VITE_HMR_CLIENT_PORT: ${FRONTEND_PORT:-5173}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173/@vite/client').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - eventos_net

volumes:
  mysql_data:
  frontend_node_modules:

networks:
  eventos_net:
    driver: bridge
